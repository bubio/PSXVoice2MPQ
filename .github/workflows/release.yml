name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

env:
  FLUTTER_VERSION: '3.38.7'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "PSXVoice2MPQ" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "PSXVoice2MPQ.app" 150 185 \
            --app-drop-link 450 185 \
            "PSXVoice2MPQ-macOS-universal.dmg" \
            "build/macos/Build/Products/Release/PSXVoice2MPQ.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: PSXVoice2MPQ-macOS-universal.dmg

  build-windows:
    strategy:
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create ZIP
        run: |
          Compress-Archive -Path "build\windows\${{ matrix.arch }}\runner\Release\*" -DestinationPath "PSXVoice2MPQ-Windows-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: PSXVoice2MPQ-Windows-${{ matrix.arch }}.zip

  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            flutter_arch: x64
            rpm_arch: x86_64
            appimage_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            flutter_arch: arm64
            rpm_arch: aarch64
            appimage_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev rpm libfuse2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create .desktop file
        run: |
          mkdir -p packaging
          cat > packaging/psxvoice2mpq.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=PSXVoice2MPQ
          Comment=PSX Voice to MPQ converter
          Exec=/usr/lib/psxvoice2mpq/PSXVoice2MPQ
          Icon=psxvoice2mpq
          Categories=Utility;AudioVideo;
          Terminal=false
          EOF

      - name: Package DEB
        run: |
          BUNDLE_DIR=build/linux/${{ matrix.flutter_arch }}/release/bundle
          VERSION=${{ steps.version.outputs.version }}
          PKG=packaging/deb

          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/lib/psxvoice2mpq
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/pixmaps

          cp -r $BUNDLE_DIR/* $PKG/usr/lib/psxvoice2mpq/
          chmod 755 $PKG/usr/lib/psxvoice2mpq/PSXVoice2MPQ
          ln -sf /usr/lib/psxvoice2mpq/PSXVoice2MPQ $PKG/usr/bin/psxvoice2mpq
          cp packaging/psxvoice2mpq.desktop $PKG/usr/share/applications/
          cp assets/icon/app_icon.png $PKG/usr/share/pixmaps/psxvoice2mpq.png

          cat > $PKG/DEBIAN/control << CTRL
          Package: psxvoice2mpq
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Depends: libgtk-3-0
          Maintainer: bubio
          Description: PSX Voice to MPQ converter
           Convert PSX voice files to MPQ format.
          CTRL

          dpkg-deb --build $PKG PSXVoice2MPQ-Linux-${{ matrix.arch }}.deb

      - name: Package RPM
        run: |
          BUNDLE_DIR=$(pwd)/build/linux/${{ matrix.flutter_arch }}/release/bundle
          VERSION=${{ steps.version.outputs.version }}
          TOPDIR=$(pwd)/rpmbuild

          mkdir -p $TOPDIR/{BUILD,RPMS,SOURCES,SPECS,BUILDROOT}

          cat > $TOPDIR/SPECS/psxvoice2mpq.spec << SPEC
          Name:           psxvoice2mpq
          Version:        ${VERSION}
          Release:        1
          Summary:        PSX Voice to MPQ converter
          License:        MIT
          AutoReqProv:    no
          Requires:       gtk3

          %description
          Convert PSX voice files to MPQ format.

          %install
          mkdir -p %{buildroot}/usr/lib/psxvoice2mpq
          cp -r ${BUNDLE_DIR}/* %{buildroot}/usr/lib/psxvoice2mpq/
          chmod 755 %{buildroot}/usr/lib/psxvoice2mpq/PSXVoice2MPQ
          mkdir -p %{buildroot}/usr/bin
          ln -sf /usr/lib/psxvoice2mpq/PSXVoice2MPQ %{buildroot}/usr/bin/psxvoice2mpq
          mkdir -p %{buildroot}/usr/share/applications
          cp $(pwd)/packaging/psxvoice2mpq.desktop %{buildroot}/usr/share/applications/
          mkdir -p %{buildroot}/usr/share/pixmaps
          cp $(pwd)/assets/icon/app_icon.png %{buildroot}/usr/share/pixmaps/psxvoice2mpq.png

          %files
          %defattr(-,root,root)
          /usr/lib/psxvoice2mpq
          /usr/bin/psxvoice2mpq
          /usr/share/applications/psxvoice2mpq.desktop
          /usr/share/pixmaps/psxvoice2mpq.png
          SPEC

          rpmbuild --define "_topdir $TOPDIR" --target ${{ matrix.rpm_arch }} -bb $TOPDIR/SPECS/psxvoice2mpq.spec

          cp $TOPDIR/RPMS/${{ matrix.rpm_arch }}/*.rpm PSXVoice2MPQ-Linux-${{ matrix.rpm_arch }}.rpm

      - name: Package AppImage
        run: |
          BUNDLE_DIR=build/linux/${{ matrix.flutter_arch }}/release/bundle
          VERSION=${{ steps.version.outputs.version }}

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage" -O appimagetool
          chmod +x appimagetool

          # Create AppDir
          APPDIR=PSXVoice2MPQ.AppDir
          mkdir -p $APPDIR/usr/bin
          cp -r $BUNDLE_DIR/* $APPDIR/usr/bin/

          # Desktop file and icon at AppDir root
          cat > $APPDIR/psxvoice2mpq.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=PSXVoice2MPQ
          Comment=PSX Voice to MPQ converter
          Exec=PSXVoice2MPQ
          Icon=psxvoice2mpq
          Categories=Utility;AudioVideo;
          Terminal=false
          EOF

          cp assets/icon/app_icon.png $APPDIR/psxvoice2mpq.png

          # AppRun
          cat > $APPDIR/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "${HERE}/usr/bin/PSXVoice2MPQ" "$@"
          APPRUN
          chmod +x $APPDIR/AppRun

          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool $APPDIR "PSXVoice2MPQ-Linux-${{ matrix.appimage_arch }}.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            PSXVoice2MPQ-Linux-${{ matrix.arch }}.deb
            PSXVoice2MPQ-Linux-${{ matrix.rpm_arch }}.rpm
            PSXVoice2MPQ-Linux-${{ matrix.appimage_arch }}.AppImage

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/macos-universal/PSXVoice2MPQ-macOS-universal.dmg
            artifacts/windows-x64/PSXVoice2MPQ-Windows-x64.zip
            artifacts/windows-arm64/PSXVoice2MPQ-Windows-arm64.zip
            artifacts/linux-amd64/PSXVoice2MPQ-Linux-amd64.deb
            artifacts/linux-amd64/PSXVoice2MPQ-Linux-x86_64.rpm
            artifacts/linux-amd64/PSXVoice2MPQ-Linux-x86_64.AppImage
            artifacts/linux-arm64/PSXVoice2MPQ-Linux-arm64.deb
            artifacts/linux-arm64/PSXVoice2MPQ-Linux-aarch64.rpm
            artifacts/linux-arm64/PSXVoice2MPQ-Linux-aarch64.AppImage
